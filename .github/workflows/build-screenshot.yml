name: PR Build Screenshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.53.0 install --with-deps chromium

      - name: Start local web server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 &
          echo $! > /tmp/web.pid

      - name: Capture PR screenshot
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_PATH: /builds/pr-${{ github.event.pull_request.number }}
          SCREENSHOT_URL: http://127.0.0.1:4173/
          SCREENSHOT_OUTPUT: page-build/builds/pr-${{ github.event.pull_request.number }}/screenshot.png
        run: node scripts/capture-screenshot.mjs

      - name: Stop local web server
        if: always()
        run: kill "$(cat /tmp/web.pid)" || true

      - name: Prepare builds index
        run: |
          mkdir -p page-build/builds
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const buildsRoot = path.join(process.cwd(), 'page-build/builds');
          const entries = fs.readdirSync(buildsRoot, { withFileTypes: true })
            .filter((entry) => entry.isDirectory() && entry.name.startsWith('pr-'))
            .map((entry) => entry.name)
            .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));

          const items = entries.map((entry) => `<li><a href="./${entry}/">${entry}</a></li>`).join('\n');
          const html = `<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TomatoQuest PR Builds</title></head><body>
<h1>TomatoQuest PR Builds</h1>
<p>Latest preview builds published from pull requests.</p>
<ul>${items || '<li>No PR builds yet.</li>'}</ul>
</body></html>`;
          fs.writeFileSync(path.join(buildsRoot, 'index.html'), html);
          NODE

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./page-build
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false

      - name: Upsert PR comment with screenshot link
        uses: actions/github-script@v7
        env:
          BUILD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/builds/pr-${{ github.event.pull_request.number }}/
          IMAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/builds/pr-${{ github.event.pull_request.number }}/screenshot.png
          MARKER: '<!-- pr-build-screenshot -->'
        with:
          script: |
            const marker = process.env.MARKER;
            const body = `${marker}
🧪 **Beta build preview is live**
- Build page: ${process.env.BUILD_URL}
- Screenshot: ${process.env.IMAGE_URL}

![PR build screenshot](${process.env.IMAGE_URL})`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

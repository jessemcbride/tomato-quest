name: PR Screenshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install --no-package-lock --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        run: |
          python3 -m http.server 4173 --directory . >/tmp/http.log 2>&1 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT
          npx playwright screenshot --device="Desktop Chrome" http://127.0.0.1:4173/index.html pr-screenshot.png

      - name: Upload screenshot artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshot
          path: pr-screenshot.png

      - name: Add PR comment with embedded screenshot
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const artifactUrl = process.env.ARTIFACT_URL || runUrl;

            const body = [
              '<!-- pr-screenshot-comment -->',
              '📸 Automated screenshot generated for this PR.',
              '',
              `![PR screenshot](${artifactUrl})`,
              '',
              `If the embedded image does not render, download it from: ${artifactUrl}`,
              `Workflow run: ${runUrl}`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes('<!-- pr-screenshot-comment -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

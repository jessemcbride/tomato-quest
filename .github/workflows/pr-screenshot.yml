name: PR Screenshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install --no-package-lock --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        run: |
          python3 -m http.server 4173 --directory . >/tmp/http.log 2>&1 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT
          npx playwright screenshot --device="Desktop Chrome" http://127.0.0.1:4173/index.html pr-screenshot.png

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshot
          path: pr-screenshot.png

      - name: Add PR comment with screenshot link
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const artifactUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const body = [
              '📸 Automated screenshot generated for this PR.',
              '',
              `Download it from the workflow artifacts on this run: ${artifactUrl}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });
